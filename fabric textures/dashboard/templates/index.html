<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOFAAB Studio | Digitisation Pipeline</title>
    <link rel="stylesheet" href="/static/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar sofaab-theme">
            <div class="sidebar-header">
                <div class="brand">
                    <h2>SOFAAB <span>STUDIO</span></h2>
                </div>
                <div class="main-tabs">
                    <button class="main-tab active" data-tab="fabrics">FABRICS</button>
                    <button class="main-tab" data-tab="models">MODELS</button>
                    <button class="main-tab" data-tab="legs">LEGS</button>
                </div>
            </div>

            <div class="asset-list-container">
                <div class="list-search">
                    <input type="text" id="asset-search" placeholder="Search assets...">
                </div>
                <div id="asset-list" class="asset-list">
                    <!-- Assets populated by JS -->
                    <div class="loading-state">Syncing Library...</div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="btn btn-primary" id="btn-upload-trigger">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    <span>IMPORT ASSET</span>
                </button>
                <input type="file" id="upload-input" hidden>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content">
            <div id="empty-state" class="empty-state">
                <div class="empty-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                </div>
                <h3>Select an asset to begin</h3>
                <p>Choose a fabric, model, or leg from the sidebar to start the workflow.</p>
            </div>

            <!-- Fabric Workflow -->
            <div id="fabric-editor" class="editor-view hidden">
                <header class="editor-header">
                    <div class="header-left">
                        <h2 id="fabric-display-name">Fabric Name</h2>
                        <span class="status-badge">READY FOR 2D</span>
                    </div>
                    <div class="workflow-nav">
                        <button class="workflow-step active" data-step="1">1. IMPORT SCANS</button>
                        <button class="workflow-step" data-step="2">2. 2D ADJUSTMENTS</button>
                        <button class="workflow-step" data-step="3">3. 3D ADJUSTMENTS</button>
                    </div>
                </header>
                
                <div class="workspace">
                    <div id="fabric-step-1" class="step-content">
                        <!-- Step 1 Content: Import Previews -->
                    </div>
                    <div id="fabric-step-2" class="step-content hidden">
                        <!-- Step 2 Content: 2D Adjustments -->
                    </div>
                    <div id="fabric-step-3" class="step-content hidden">
                        <!-- Step 3 Content: 3D View + PBR -->
                    </div>
                </div>
            </div>

            <!-- Model Workflow -->
            <div id="model-editor" class="editor-view hidden">
                <header class="editor-header">
                    <div class="header-left">
                        <h2 id="model-display-name">Model Name</h2>
                    </div>
                    <div class="workflow-nav">
                        <button class="workflow-step active" data-step="1">1. IMPORT MODELS</button>
                        <button class="workflow-step" data-step="2">2. GLB COMPRESSION</button>
                    </div>
                </header>
                <div class="workspace">
                    <!-- Model Steps -->
                </div>
            </div>

            <!-- Legs Workflow -->
            <div id="legs-editor" class="editor-view hidden">
                <header class="editor-header">
                    <div class="header-left">
                        <h2 id="leg-display-name">Leg Name</h2>
                    </div>
                    <div class="workflow-nav">
                        <button class="workflow-step active" data-step="1">1. IMPORT LEGS</button>
                        <button class="workflow-step" data-step="2">2. ATTACH TO MODEL</button>
                    </div>
                </header>
                <div class="workspace">
                    <!-- Legs Steps -->
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="/static/app.js"></script>
</body>
</html>
